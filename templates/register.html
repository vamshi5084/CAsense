<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — CAsense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="auth-page">
        <div class="auth-card">
            <div class="logo">💠 CAsense</div>
            <h2 data-i18n="reg_title">Create Account</h2>
            <p class="subtitle" data-i18n="reg_subtitle">Start managing your finances smartly</p>

            {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="form-group">
                    <label for="username" data-i18n="label_username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus
                        minlength="3">
                </div>

                <div class="form-group">
                    <label for="email"><span data-i18n="label_email">📧 Email Address</span></label>
                    <input type="email" id="email" name="email" placeholder="yourname@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="password" data-i18n="label_password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required
                        minlength="4">
                </div>

                <div class="form-group">
                    <label for="confirm_password" data-i18n="label_confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password"
                        placeholder="Re-enter your password" required minlength="4">
                </div>

                <button type="submit" class="btn btn-success" data-i18n="btn_register">Create Account →</button>
            </form>

            <div class="auth-footer">
                <span data-i18n="reg_have_account">Already have an account?</span> <a href="/login"
                    data-i18n="reg_sign_in">Sign in</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='translations.js') }}"></script>
</body>

</html>
